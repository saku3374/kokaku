<title>攻殻機動隊 実戦メモ</title>
<style>

<body>
<div id="root"></div>
<script>

var KZ=[50,100,150,200,250,300,350,400,450,550];
var ZCOLS=["[緑]","[黄]","[赤]","[青]","[紫]","[虹]","[金]"];

var CZLV=["[青]","[緑]","[赤]","[虹]"];
var RARE=["なし","チェリー","スイカ","強役"];

var MI={A:{c:"#6c757d",d:"天井550G",ceil:550},B:{c:"#0d6efd",d:"天井450G",ceil:450},C:{c:"#fd7e14",d:"天井250G*",ceil:250},D:{c:"#dc3545",d:"天井150G**",ceil:150}};
var ZT={50:{A:"25%",B:"50%",C:"25%",D:"100%"},100:{A:"50%",B:"1%",C:"50%",D:"1%"},150:{A:"1%",B:"50%",C:"1%",D:"天井"},200:{A:"家出",B:"家出",C:"家出",D:"-"},250:{A:"50%",B:"25%",C:"天井",D:"-"},300:{A:"-",B:"1%",C:"-",D:"-"},350:{A:"25%",B:"50%",C:"-",D:"-"},400:{A:"家出",B:"家出",C:"-",D:"-"},450:{A:"50%",B:"天井",C:"-",D:"-"},550:{A:"天井",B:"-",C:"-",D:"-"}};
var ICHI=[{k:"素子",h:"デフォルト",c:"#555"},{k:"戦闘中素子",h:"高設定示唆(弱)",c:"#198754"},{k:"トグサ",h:"奇数設定示唆",c:"#4da8ff"},{k:"バトー",h:"偶数設定示唆",c:"#4da8ff"},{k:"ポーカー",h:"高モード示唆",c:"#0dcaf0"},{k:"素子後ろ姿",h:"モードB以上濃厚",c:"#ffc107"},{k:"公安9課",h:"モードC以上濃厚",c:"#fd7e14"},{k:"電脳素子",h:"モードC以上+D期待",c:"#a855f7"},{k:"アオイ",h:"モードD+設定4以上",c:"#fbbf24"},{k:"2ndGIG",h:"白の境界 権利保有",c:"#22d3ee"}];
var FRAMES=[{k:"なし",c:"#444"},{k:"赤枠",c:"#dc3545"},{k:"紫枠",c:"#a855f7"},{k:"金枠",c:"#ffc107"}];
var TROPH=[{k:"なし",l:"なし",c:"#444"},{k:"銅",l:"銅(設定2以上)",c:"#cd7f32"},{k:"銀",l:"銀(設定3以上)",c:"#adb5bd"},{k:"金",l:"金(設定4以上)",c:"#ffc107"},{k:"キリン",l:"キリン(設定5以上)",c:"#fd7e14"},{k:"虹",l:"虹(設定6確定)",c:"#0dcaf0"}];
var SAM=[{k:"①",h:"デフォルト"},{k:"②",h:"復活期待50%"},{k:"③",h:"調査中"},{k:"④",h:"偶数アップ"},{k:"⑤",h:"高設定弱"},{k:"⑥",h:"高設定強"},{k:"⑦",h:"調査中"},{k:"⑧",h:"設定2以上"},{k:"⑨",h:"設定4以上"},{k:"⑩",h:"設定6濃厚"}];
var TBL=["①","②","③","④","⑤","⑥","⑦"];
var CYC=["①","②","③","④","⑤","⑥","⑦","⑧"];
var GRN="#00ff99",BG="#07070f",MUT="#556";
var _id=0;
function uid(){return ++_id+"_"+Date.now();}
function newAT(n){return{n:n,cycles:[newCyc()],mai:null,bmai:null,ichi:null,frame:"なし",sam:null,trophy:"なし",tachi:null,hakky:null,note:""};}
function newCyc(){var k={};KZ.forEach(function(g){k[g]={col:null,hat:null};});return{id:uid(),naibu:"通常",conf:[],deny:[],tachi:null,kirei:k,sen:[],cz:null};}
function newSen(g,tr){return{id:uid(),g:g,tr:tr,tbl:null,col:null,ok:null,memo:""};}
function newCZ(g,tp){return{id:uid(),g:g,type:tp,lv:null,rare:"なし",ok:null,fuk:null,sam:null};}
var S={scr:"home",ats:[],curAT:null,curCyc:0,totalG:"",totalMai:"",senG:null,senTr:"規定G",czG:null,openSec:null,openSen:null};
function save(){try{localStorage.setItem(SK,JSON.stringify({ats:S.ats,totalG:S.totalG,totalMai:S.totalMai}));}catch(e){}}
function load(){try{var d=JSON.parse(localStorage.getItem(SK)||"{}");if(Array.isArray(d.ats))S.ats=d.ats;if(d.totalG)S.totalG=d.totalG;if(d.totalMai)S.totalMai=d.totalMai;}catch(e){}}
function getAT(){return S.curAT!==null?S.ats[S.curAT]:null;}
function getCyc(){var a=getAT();return a?a.cycles[S.curCyc]:null;}
function updAT(fn){S.ats[S.curAT]=fn(S.ats[S.curAT]);save();}
function updCyc(fn){var a=getAT();var cs=a.cycles.slice();cs[S.curCyc]=fn(cs[S.curCyc]);S.ats[S.curAT]=oa(a,{cycles:cs});save();}
function updSen(si,k,v){updCyc(function(c){var s=c.sen.slice();s[si]=oa(s[si]);s[si][k]=v;return oa(c,{sen:s});});}
function oa(o,p){return Object.assign({},o,p||{});}
function find(arr,k,v){for(var i=0;i<arr.length;i++)if(arr[i][k]===v)return arr[i];return null;}
function modeState(m){var c=getCyc();if(!c)return"off";return c.conf.indexOf(m)>=0?"on":c.deny.indexOf(m)>=0?"deny":"off";}
function cycleMode(m){
  updCyc(function(c){
    if(c.conf.indexOf(m)<0&&c.deny.indexOf(m)<0)return oa(c,{conf:c.conf.concat([m])});
    if(c.conf.indexOf(m)>=0)return oa(c,{conf:c.conf.filter(function(x){return x!==m;}),deny:c.deny.concat([m])});
    return oa(c,{deny:c.deny.filter(function(x){return x!==m;})});
  });
}
function d(style,text){var e=document.createElement("div");if(style)e.setAttribute("style",style);if(text!=null)e.textContent=text;return e;}
function s(style,text){var e=document.createElement("span");if(style)e.setAttribute("style",style);if(text!=null)e.textContent=text;return e;}
function b(style,text,fn){var e=document.createElement("button");if(style)e.setAttribute("style",style);if(text!=null)e.textContent=text;if(fn)e.addEventListener("click",fn);return e;}
function ap(p,c){if(!c)return;if(Array.isArray(c)){c.forEach(function(x){if(x)p.appendChild(x);});}else{p.appendChild(c);}return p;}
function mkBtn(lbl,active,color,fn,sm){
  return b("background:"+(active?color+"33":"transparent")+";color:"+(active?color:color+"88")+";border:1px solid "+(active?color:color+"33")+";border-radius:5px;padding:"+(sm?"3px 8px":"5px 11px")+";font-size:"+(sm?"11px":"12px")+";font-weight:"+(active?"700":"400")+";cursor:pointer;",lbl,fn);
}
function mkTag(text,color,sm){
  return s("display:inline-block;background:"+color+"22;border:1px solid "+color+"44;color:"+color+";border-radius:3px;padding:"+(sm?"1px 4px":"2px 6px")+";font-size:"+(sm?"10px":"11px")+";margin:1px;",text);
}
function card(){return d("background:#0e0e1a;border:1px solid #222235;border-radius:10px;padding:10px 12px;margin-bottom:8px;");}
function sec(txt){return s("font-size:9px;color:"+GRN+";letter-spacing:3px;text-transform:uppercase;margin-bottom:6px;font-weight:700;display:block;",txt);}
function row(){return d("display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px;");}
function showNumpad(label,curVal,onDone){
  var v=String(curVal||"");
  var ov=d("position:fixed;top:0;left:0;right:0;bottom:0;background:#000a;z-index:200;display:flex;align-items:flex-end;");
  var pad=d("background:#0a0a18;border-top:2px solid #00ff9944;width:100%;padding:10px 12px 24px;");
  var top=d("display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;");
  ap(top,[s("color:"+MUT+";font-size:11px;",label)]);
  var disp=s("color:"+GRN+";font-size:22px;font-weight:700;min-width:60px;text-align:right;",v||"-");
  top.appendChild(disp);pad.appendChild(top);
  var grid=d("display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px;");
  ["7","8","9","4","5","6","1","2","3","C","0","BS"].forEach(function(k){
    var sp=k==="BS"||k==="C";
    grid.appendChild(b("background:"+(sp?"#1a1a2a":"#111122")+";color:"+(k==="BS"?"#ff6666":k==="C"?"#ff9944":GRN)+";border:1px solid "+(sp?"#333":"#1e1e3a")+";border-radius:8px;padding:14px 0;font-size:18px;font-weight:700;",k,function(){
      if(k==="BS")v=v.slice(0,-1);else if(k==="C")v="";else if(v.length<4)v+=k;
      disp.textContent=v||"-";
    }));
  });
  pad.appendChild(grid);
  var bb=d("display:grid;grid-template-columns:1fr 1fr;gap:8px;");
  bb.appendChild(b("background:transparent;color:#556;border:1px solid #333;border-radius:8px;padding:12px;font-size:14px;","キャンセル",function(){ov.remove();}));
  bb.appendChild(b("background:"+GRN+";color:"+BG+";border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:700;","確定",function(){onDone(v?parseInt(v):null);ov.remove();render();}));
  pad.appendChild(bb);ov.appendChild(pad);
  ov.addEventListener("click",function(e){if(e.target===ov)ov.remove();});
  document.body.appendChild(ov);
}
function gBtn(val,ph,lbl,fn){
  return b("background:#16162a;border:1px solid "+(val?"#444":"#222235")+";border-radius:7px;color:"+(val?GRN:"#445")+";padding:8px 12px;font-size:"+(val?"16px":"13px")+";font-weight:"+(val?"700":"400")+";text-align:left;width:100%;display:block;",val?val+"G":(ph||"G数入力"),function(){showNumpad(lbl||"G数",val,function(v){fn(v);});});
}
function showConfirm(msg,onOk){
  var ov=d("position:fixed;top:0;left:0;right:0;bottom:0;background:#000a;z-index:300;display:flex;align-items:center;justify-content:center;");
  var box=d("background:#0e0e1a;border:1px solid #444;border-radius:12px;padding:20px 16px;margin:0 20px;max-width:320px;width:100%;");
  box.appendChild(d("color:#dde;font-size:14px;margin-bottom:16px;line-height:1.6;",msg));
  var bb=d("display:grid;grid-template-columns:1fr 1fr;gap:8px;");
  bb.appendChild(b("background:transparent;color:#aaa;border:1px solid #444;border-radius:8px;padding:11px;font-size:14px;","キャンセル",function(){ov.remove();}));
  bb.appendChild(b("background:#dc3545;color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:700;","リセット",function(){ov.remove();onOk();}));
  box.appendChild(bb);ov.appendChild(box);document.body.appendChild(ov);
}
function mkSec(id,lbl,color,badge,buildFn){
  var open=S.openSec===id;
  var hdr=b("background:"+(open?color+"18":"transparent")+";color:"+(open?color:color+"66")+";border:1px solid "+(open?color+"44":"#222")+";border-radius:"+(open?"7px 7px 0 0":"7px")+";padding:7px 12px;font-size:12px;font-weight:700;width:100%;text-align:left;display:flex;align-items:center;justify-content:space-between;margin-bottom:"+(open?"0":"2px")+";",null,function(){S.openSec=S.openSec===id?null:id;render();});
  hdr.appendChild(s("",(open?"v ":">> ")+lbl));
  if(badge)hdr.appendChild(s("font-size:10px;opacity:0.7;",badge));
  var wrap=d("margin-bottom:6px;");wrap.appendChild(hdr);
  if(open){var body=d("background:#16162a;border:1px solid #222;border-top:none;border-radius:0 0 7px 7px;padding:10px 10px 8px;");buildFn(body);wrap.appendChild(body);}
  return wrap;
}
function buildReport(){
  var lines=["スマスロ攻殻機動隊 実戦まとめ","総G数:"+S.totalG+"G / 差枚:"+S.totalMai+"枚",""];
  S.ats.forEach(function(a){
    var prev=S.ats[a.n-2];
    lines.push("AT"+a.n+(prev&&prev.tachi?" 看板:"+prev.tachi:""));
    a.cycles.forEach(function(c,ci){
      var cn=CYC[ci]||String(ci+1);
      lines.push(cn+c.naibu+(c.conf.length?" 確:"+c.conf.join(""):"")+(c.deny.length?" 否:"+c.deny.join(""):"")+(c.tachi?" 看板"+c.tachi:""));
      var kp=[];KZ.forEach(function(g){var k=c.kirei[g];if(k.col||k.hat!==null)kp.push(g+(k.col||"")+(k.hat===true?"〇":k.hat===false?"-":""));});
      if(kp.length)lines.push(" ["+kp.join(" ")+"]");
      c.sen.forEach(function(s){lines.push(" ("+s.g+"G"+(s.tr==="ポイント"?"P":"")+(s.tbl?" "+s.tbl:"")+(s.col||"")+(s.ok===true?"〇":s.ok===false?"x":"?")+(s.memo?" "+s.memo:"")+")");});
      if(c.cz){var cz=c.cz;lines.push(" "+cz.g+"G CZ["+cz.type+"] "+(cz.lv||"?")+(cz.rare!=="なし"?" "+cz.rare:"")+(cz.ok===true?"〇":cz.ok===false?"x":"?")+(cz.fuk===true?" 復活〇":cz.fuk===false?" 復活x":"")+(cz.sam?" 画面"+cz.sam:""));}
    });
    lines.push(" -> "+(a.mai?a.mai+"枚":"")+(a.bmai?" (+"+a.bmai+")":"")+(a.ichi?" "+a.ichi+(a.frame!=="なし"?" "+a.frame:""):"")+(a.sam?" 画面"+a.sam:"")+(a.trophy!=="なし"?" "+a.trophy:"")+(a.hakky?" 白Lv"+a.hakky:"")+(a.tachi?" "+a.tachi:""));
    if(a.note)lines.push(" "+a.note);lines.push("");
  });
  return lines.join("\n");
}
function render(){var root=document.getElementById("root");root.innerHTML="";if(S.scr==="home")rHome(root);else if(S.scr==="record")rRecord(root);else if(S.scr==="summary")rSummary(root);}
function rHome(root){
  var hdr=d("background:#0e0e1a;border-bottom:1px solid #00ff9922;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;");
  ap(hdr,[s("color:"+GRN+";font-size:12px;font-weight:700;letter-spacing:3px;","攻殻機動隊 実戦メモ"),mkTag(S.ats.length+"AT",GRN,true)]);
  root.appendChild(hdr);
  var wrap=d("padding:10px 12px;");
  var sc=card();sc.appendChild(sec("セッション"));
  var st=d("display:flex;gap:8px;margin-bottom:10px;");
  var senC=S.ats.reduce(function(a,r){return a+r.cycles.reduce(function(b,c){return b+c.sen.length;},0);},0);
  [{v:S.ats.length,l:"AT",c:GRN},{v:senC,l:"殲滅",c:"#ffc107"},{v:S.ats.filter(function(r){return r.trophy!=="なし";}).length,l:"トロフィー",c:"#a855f7"}].forEach(function(x){
    var box=d("flex:1;text-align:center;");ap(box,[d("font-size:24px;font-weight:700;color:"+x.c+";",String(x.v)),d("font-size:9px;color:"+MUT+";",x.l)]);st.appendChild(box);
  });
  sc.appendChild(st);
  var gr=d("display:flex;gap:6px;");
  [{v:S.totalG,p:"総G数",k:"totalG"},{v:S.totalMai,p:"総差枚",k:"totalMai"}].forEach(function(x){
    var box=d("flex:1;");box.appendChild(s("font-size:10px;color:"+MUT+";margin-bottom:2px;display:block;",x.p));
    var gb=gBtn(x.v?parseInt(x.v):null,x.p,x.p,function(val){S[x.k]=val?String(val):"";save();});box.appendChild(gb);gr.appendChild(box);
  });
  sc.appendChild(gr);wrap.appendChild(sc);
  S.ats.forEach(function(a,i){
    var prev=S.ats[i-1],it=prev?prev.tachi:null;
    var ii=find(ICHI,"k",a.ichi),ti=find(TROPH,"k",a.trophy);
    var c=card();c.style.borderColor=S.curAT===i?GRN+"44":"#222235";c.style.cursor="pointer";
    c.addEventListener("click",function(){S.curAT=i;S.curCyc=a.cycles.length-1;S.scr="record";S.openSec=null;S.openSen=null;render();});
    var top=d("display:flex;align-items:center;gap:6px;margin-bottom:4px;");
    top.appendChild(s("color:"+GRN+";font-weight:700;font-size:14px;","AT"+a.n));
    if(it)top.appendChild(mkTag("看板:"+it,"#0dcaf0",true));
    if(a.mai)top.appendChild(s("color:#0dcaf0;font-weight:700;margin-left:auto;",a.mai+"枚"+(a.bmai?" (+"+a.bmai+")":"")));
    if(a.trophy!=="なし"&&ti)top.appendChild(mkTag(a.trophy,ti.c,true));
    c.appendChild(top);
    var cd=d("font-size:10px;color:#556;line-height:1.9;");
    a.cycles.forEach(function(cy,ci){
      var czOk=cy.cz?cy.cz.ok:null;
      var r=d("padding-left:4px;border-left:2px solid "+(czOk===true?"#00ff9944":czOk===false?"#ff444433":"#333")+";");
      var txt=(CYC[ci]||ci+1)+" "+cy.naibu;
      if(cy.tachi)txt+=" ["+cy.tachi+"]";
      cy.conf.forEach(function(m){txt+=" 確"+m;});
      cy.sen.forEach(function(sv){txt+=" "+sv.g+"G"+(sv.ok===true?"〇":sv.ok===false?"x":"");});
      if(cy.cz)txt+=" CZ"+(cy.cz.ok===true?"〇":cy.cz.ok===false?"x":"");
      r.textContent=txt;cd.appendChild(r);
    });
    c.appendChild(cd);
    if(a.ichi&&ii){var id2=d("margin-top:4px;");id2.appendChild(mkTag(a.ichi,ii.c,true));c.appendChild(id2);}
    wrap.appendChild(c);
  });
  wrap.appendChild(b("background:"+GRN+";color:"+BG+";border:none;border-radius:9px;padding:12px;font-size:14px;font-weight:700;width:100%;margin-bottom:6px;","+ 新しいATを開始",function(){
    S.ats.push(newAT(S.ats.length+1));S.curAT=S.ats.length-1;S.curCyc=0;S.scr="record";S.openSec=null;S.openSen=null;save();render();
  }));
  wrap.appendChild(b("background:transparent;color:#aaa;border:1px solid #333;border-radius:9px;padding:12px;font-size:14px;font-weight:700;width:100%;margin-bottom:6px;","設定判別サマリー",function(){S.scr="summary";render();}));
  wrap.appendChild(b("background:transparent;color:#dc3545;border:1px solid #dc354533;border-radius:9px;padding:12px;font-size:14px;font-weight:700;width:100%;margin-bottom:6px;","リセット",function(){

  }));
  var kp=card();kp.style.marginTop="8px";kp.appendChild(sec("一枚絵カンペ"));
  ICHI.filter(function(e){return e.c!=="#555";}).forEach(function(e){
    var r=d("display:flex;align-items:center;gap:6px;margin-bottom:4px;");ap(r,[mkTag(e.k,e.c,true),s("font-size:11px;color:#aaa;"," -> "+e.h)]);kp.appendChild(r);
  });
  var td=d("margin-top:6px;border-top:1px solid #222235;padding-top:6px;");
  td.appendChild(s("font-size:9px;color:"+GRN+";letter-spacing:2px;margin-bottom:4px;display:block;","タチコマ看板"));

  kp.appendChild(td);wrap.appendChild(kp);root.appendChild(wrap);
}
function rRecord(root){
  var at=getAT(),cyc=getCyc();if(!at||!cyc)return;
  var prev=S.ats[S.curAT-1],it=prev?prev.tachi:null;
  var hdr=d("background:#0e0e1a;border-bottom:1px solid #00ff9922;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;");
  ap(hdr,[b("background:none;border:none;color:"+GRN+";font-size:18px;padding:0 4px;","<-",function(){S.scr="home";render();}),s("color:"+GRN+";font-weight:700;font-size:13px;","AT"+at.n+" "+(CYC[S.curCyc]||"")),s("","")]);
  root.appendChild(hdr);
  var wrap=d("padding:8px 10px;");
  if(it&&S.curCyc===0){
    var ib=d("background:#0a0a20;border:1px solid #0dcaf044;border-radius:10px;padding:10px 12px;margin-bottom:8px;");
    var th=find(TACHI,"k",it);
    ap(ib,[s("font-size:10px;color:#0dcaf0;","前AT看板（次AT示唆）: "),s("font-size:14px;font-weight:700;color:#0dcaf0;","["+it+"] "),s("font-size:11px;color:#aaa;",th?th.h:"")]);

    S.ats.push(newAT(S.ats.length+1));S.curAT=S.ats.length-1;S.curCyc=0;S.scr="record";S.openSec=null;S.openSen=null;save();render();
  }));
  wrap.appendChild(br);
  wrap.appendChild(b("background:"+GRN+";color:"+BG+";border:none;border-radius:9px;padding:12px;font-size:14px;font-weight:700;width:100%;margin-top:6px;","<- ホームへ",function(){S.scr="home";render();}));
  root.appendChild(wrap);
}
function rSummary(root){
  var ats=S.ats,imeC={},trC={},czOk=0,czNg=0,fukOk=0,fukNg=0;
  ats.forEach(function(a){
    if(a.ichi)imeC[a.ichi]=(imeC[a.ichi]||0)+1;
    trC[a.trophy]=(trC[a.trophy]||0)+1;
    a.cycles.forEach(function(c){if(c.cz){if(c.cz.ok===true)czOk++;if(c.cz.ok===false){czNg++;if(c.cz.fuk===true)fukOk++;if(c.cz.fuk===false)fukNg++;}}});
  });
  var hdr=d("background:#0e0e1a;border-bottom:1px solid #00ff9922;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;");
  ap(hdr,[b("background:none;border:none;color:"+GRN+";font-size:18px;padding:0 4px;","<-",function(){S.scr="home";render();}),s("color:"+GRN+";font-weight:700;font-size:12px;letter-spacing:2px;","設定判別サマリー"),mkTag("AT"+ats.length,GRN,true)]);
  root.appendChild(hdr);
  var wrap=d("padding:10px 12px;");
  var cs=card();cs.appendChild(sec("CZ成績"));
  var czr=d("display:flex;gap:16px;font-size:18px;font-weight:700;margin-bottom:4px;");
  ap(czr,[s("color:#00ff99;","OK "+czOk+"回"),s("color:#ff4444;","NG "+czNg+"回")]);
  if((czOk+czNg)>0)czr.appendChild(s("color:"+MUT+";font-size:13px;font-weight:400;","成功率"+Math.round(czOk/(czOk+czNg)*100)+"%"));
  cs.appendChild(czr);
  if((fukOk+fukNg)>0)cs.appendChild(d("font-size:12px;color:#aaa;","復活: "+fukOk+"OK / "+fukNg+"NG ("+Math.round(fukOk/(fukOk+fukNg)*100)+"%)"));
  wrap.appendChild(cs);
  var ic=card();ic.appendChild(sec("一枚絵分布"));
  if(!Object.keys(imeC).length)ic.appendChild(d("color:"+MUT+";font-size:11px;","記録なし"));
  else Object.keys(imeC).forEach(function(k){
    var cnt=imeC[k],info=find(ICHI,"k",k),c=info?info.c:"#888";
    var r=d("display:flex;align-items:center;gap:8px;margin-bottom:5px;");
    r.appendChild(s("min-width:78px;font-size:11px;color:"+c+";font-weight:700;",k));
    var bar=d("flex:1;background:#1a1a2a;border-radius:3px;height:6px;");
    bar.appendChild(d("background:"+c+";width:"+Math.round(cnt/ats.length*100)+"%;height:100%;border-radius:3px;"));
    r.appendChild(bar);r.appendChild(s("color:#aaa;font-size:11px;min-width:36px;",cnt+"/"+ats.length));ic.appendChild(r);
  });
  wrap.appendChild(ic);
  var tc=card();tc.appendChild(sec("トロフィー"));
  var vt=Object.keys(trC).filter(function(k){return k!=="なし";});
  if(!vt.length)tc.appendChild(d("color:"+MUT+";font-size:11px;","なし"));
  else vt.forEach(function(k){var t=find(TROPH,"k",k);var dd=d("margin-bottom:4px;");dd.appendChild(mkTag((t?t.l:k)+" x"+trC[k],t?t.c:"#888",false));tc.appendChild(dd);});
  wrap.appendChild(tc);
  var sc2=card();sc2.appendChild(sec("設定推測"));
  var hints=[];
  if((trC["虹"]||0)>0)hints.push({c:"#0dcaf0",t:"虹 -> 設定6確定！"});
  if((trC["キリン"]||0)>0)hints.push({c:"#fd7e14",t:"キリン -> 設定5以上確定"});
  if((trC["金"]||0)>=2)hints.push({c:"#ffc107",t:"金x"+(trC["金"]||0)+" -> 設定4以上濃厚"});
  if((imeC["アオイ"]||0)>0)hints.push({c:"#fbbf24",t:"アオイ"+(imeC["アオイ"]||0)+"回 -> モードD+設定4以上"});
  if(!hints.length)hints.push({c:"#334",t:"サンプル不足。記録を続けましょう。"});
  hints.forEach(function(x){sc2.appendChild(d("font-size:12px;color:"+x.c+";margin-bottom:5px;","* "+x.t));});
  wrap.appendChild(sc2);
  var rc=card();rc.appendChild(sec("実戦レポート"));
  var pre=document.createElement("pre");
  pre.setAttribute("style","background:#050508;border:1px solid #222235;border-radius:7px;padding:10px;font-size:10px;color:#0f0;white-space:pre-wrap;line-height:1.8;max-height:320px;overflow:auto;margin:0;");
  pre.textContent=buildReport();rc.appendChild(pre);
  var copyBtn=b("background:transparent;color:"+GRN+";border:1px solid #00ff9944;border-radius:7px;padding:8px 12px;font-size:12px;font-weight:700;width:100%;margin-top:6px;","レポートをコピー",function(){
    var text=buildReport();
    function fb(){var ta=document.createElement("textarea");ta.value=text;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.select();ta.setSelectionRange(0,99999);try{document.execCommand("copy");copyBtn.textContent="コピーしました";setTimeout(function(){copyBtn.textContent="レポートをコピー";},1500);}catch(e){}document.body.removeChild(ta);}
    if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(text).then(function(){copyBtn.textContent="コピーしました";setTimeout(function(){copyBtn.textContent="レポートをコピー";},1500);}).catch(fb);else fb();
  });
  rc.appendChild(copyBtn);wrap.appendChild(rc);root.appendChild(wrap);
}
load();render();
</script>
